<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" style="width:100%;height:auto;display:block;">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;display=swap');</style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf6ec;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#faebd7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e6cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4895f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0693a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#a0693a" flood-opacity="0.18"/>
    </filter>
    <filter id="softshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#a0693a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="url(#bgGrad)" rx="20"/>
  <!-- Outer dashed border -->
  <rect x="16" y="16" width="768" height="1068" fill="none" stroke="#c4895f" stroke-width="3" rx="16" stroke-dasharray="14,6"/>
  <rect x="26" y="26" width="748" height="1048" fill="none" stroke="#e8c56a" stroke-width="1.5" rx="12"/>

  <!-- BUNTING STRING -->
  <path d="M 80 120 Q 200 90 320 115 Q 400 95 480 115 Q 600 90 720 120" fill="none" stroke="#a0693a" stroke-width="2.5"/>
  <polygon points="90,120 110,120 100,148" fill="#c4895f" opacity="0.9"/>
  <polygon points="118,113 138,113 128,141" fill="#e8c56a" opacity="0.9"/>
  <polygon points="148,108 168,108 158,136" fill="#8faa7c" opacity="0.9"/>
  <polygon points="178,106 198,106 188,134" fill="#c4895f" opacity="0.9"/>
  <polygon points="210,104 230,104 220,132" fill="#e8c56a" opacity="0.9"/>
  <polygon points="244,104 264,104 254,132" fill="#8faa7c" opacity="0.9"/>
  <polygon points="278,106 298,106 288,134" fill="#c4895f" opacity="0.9"/>
  <polygon points="312,109 332,109 322,137" fill="#e8c56a" opacity="0.9"/>
  <polygon points="348,111 368,111 358,139" fill="#8faa7c" opacity="0.9"/>
  <polygon points="384,110 404,110 394,138" fill="#c4895f" opacity="0.9"/>
  <polygon points="420,111 440,111 430,139" fill="#e8c56a" opacity="0.9"/>
  <polygon points="456,109 476,109 466,137" fill="#8faa7c" opacity="0.9"/>
  <polygon points="492,106 512,106 502,134" fill="#c4895f" opacity="0.9"/>
  <polygon points="528,104 548,104 538,132" fill="#e8c56a" opacity="0.9"/>
  <polygon points="564,104 584,104 574,132" fill="#8faa7c" opacity="0.9"/>
  <polygon points="600,106 620,106 610,134" fill="#c4895f" opacity="0.9"/>
  <polygon points="636,108 656,108 646,136" fill="#e8c56a" opacity="0.9"/>
  <polygon points="672,111 692,111 682,139" fill="#8faa7c" opacity="0.9"/>
  <polygon points="700,114 720,114 710,142" fill="#c4895f" opacity="0.9"/>

  <!-- TEDDY BEAR -->
  <g transform="translate(400, 270)">
    <!-- Ears -->
    <circle cx="-62" cy="-78" r="34" fill="#c4895f"/>
    <circle cx="-62" cy="-78" r="20" fill="#e8b48a"/>
    <circle cx="62" cy="-78" r="34" fill="#c4895f"/>
    <circle cx="62" cy="-78" r="20" fill="#e8b48a"/>
    <!-- Head -->
    <circle cx="0" cy="-30" r="88" fill="#d4956a" filter="url(#softshadow)"/>
    <!-- Muzzle -->
    <ellipse cx="0" cy="14" rx="38" ry="28" fill="#e8b48a"/>
    <!-- Eyes -->
    <circle cx="-32" cy="-46" r="13" fill="#3b1a08"/>
    <circle cx="32" cy="-46" r="13" fill="#3b1a08"/>
    <circle cx="-28" cy="-50" r="5" fill="#fff" opacity="0.8"/>
    <circle cx="36" cy="-50" r="5" fill="#fff" opacity="0.8"/>
    <!-- Nose -->
    <ellipse cx="0" cy="2" rx="12" ry="8" fill="#5c3317"/>
    <!-- Smile -->
    <path d="M -16 14 Q 0 28 16 14" fill="none" stroke="#5c3317" stroke-width="3" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="-52" cy="-8" rx="18" ry="10" fill="#e8956a" opacity="0.45"/>
    <ellipse cx="52" cy="-8" rx="18" ry="10" fill="#e8956a" opacity="0.45"/>
    <!-- Bow tie -->
    <polygon points="-28,58 0,72 -28,86" fill="#c4895f"/>
    <polygon points="28,58 0,72 28,86" fill="#c4895f"/>
    <circle cx="0" cy="72" r="9" fill="#a0693a"/>
    <!-- Body -->
    <ellipse cx="0" cy="175" rx="78" ry="88" fill="#c4895f" filter="url(#softshadow)"/>
    <!-- Tummy -->
    <ellipse cx="0" cy="180" rx="46" ry="52" fill="#e8b48a"/>
    <!-- Arms -->
    <ellipse cx="-96" cy="148" rx="28" ry="58" fill="#c4895f" transform="rotate(-18,-96,148)"/>
    <ellipse cx="96" cy="148" rx="28" ry="58" fill="#c4895f" transform="rotate(18,96,148)"/>
    <!-- Legs -->
    <ellipse cx="-42" cy="256" rx="30" ry="46" fill="#c4895f"/>
    <ellipse cx="42" cy="256" rx="30" ry="46" fill="#c4895f"/>
    <!-- Paw pads -->
    <ellipse cx="-42" cy="295" rx="34" ry="18" fill="#d4956a"/>
    <ellipse cx="42" cy="295" rx="34" ry="18" fill="#d4956a"/>
    <!-- Tiny heart held by bear -->
    <path d="M -16,132 C -16,120 -4,114 0,124 C 4,114 16,120 16,132 C 16,142 0,154 0,154 C 0,154 -16,142 -16,132 Z" fill="#e05c6a" opacity="0.9"/>
  </g>

  <!-- Headline -->
  <text x="400" y="592" font-family="Playfair Display, Georgia, serif" font-size="52" font-weight="bold" fill="#5c3317" text-anchor="middle" letter-spacing="1">Baby Goel</text>
  <text x="400" y="640" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#a0693a" text-anchor="middle" font-style="italic" letter-spacing="2">is on the way!</text>

  <!-- Banner pill -->
  <rect x="80" y="668" width="640" height="58" rx="29" fill="url(#bannerGrad)" filter="url(#shadow)"/>
  <text x="400" y="705" font-family="Playfair Display, Georgia, serif" font-size="26" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="3">&#10022;  BABY SHOWER  &#10022;</text>

  <!-- White info card -->
  <rect x="55" y="748" width="690" height="316" rx="20" fill="#fff" opacity="0.85" filter="url(#shadow)"/>

  <text x="400" y="793" font-family="Playfair Display, Georgia, serif" font-size="16" fill="#a0693a" text-anchor="middle" font-style="italic" letter-spacing="1">&#8212; in honour of parents-to-be &#8212;</text>
  <text x="400" y="828" font-family="Playfair Display, Georgia, serif" font-size="28" font-weight="bold" fill="#5c3317" text-anchor="middle">Nidhi Jindal</text>
  <text x="400" y="854" font-family="Playfair Display, Georgia, serif" font-size="16" fill="#a0693a" text-anchor="middle" letter-spacing="1">&amp; Manu Goel</text>

  <line x1="160" y1="868" x2="640" y2="868" stroke="#e8c56a" stroke-width="1.5"/>
  <line x1="160" y1="882" x2="640" y2="882" stroke="#e8c56a" stroke-width="1.5"/>

  <!-- Calendar icon -->
  <g transform="translate(174, 896)">
    <rect x="0" y="0" width="38" height="34" rx="5" fill="#c4895f"/>
    <rect x="0" y="0" width="38" height="12" rx="5" fill="#a0693a"/>
    <rect x="0" y="8" width="38" height="4" fill="#a0693a"/>
    <circle cx="10" cy="0" r="3" fill="#faebd7"/>
    <circle cx="28" cy="0" r="3" fill="#faebd7"/>
    <text x="19" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#fff" text-anchor="middle">APR</text>
    <text x="19" y="29" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#5c3317" text-anchor="middle">26</text>
  </g>
  <text x="226" y="921" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#5c3317">Sunday, April 26, 2026</text>

  <text x="400" y="956" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#5c3317" text-anchor="middle">1:00 PM onwards</text>

  <line x1="200" y1="972" x2="600" y2="972" stroke="#e8c56a" stroke-width="1" stroke-dasharray="6,4"/>

  <text x="400" y="996" font-family="Playfair Display, Georgia, serif" font-size="18" fill="#666" text-anchor="middle">302 S 740 E, Unit G105</text>
  <text x="400" y="1018" font-family="Playfair Display, Georgia, serif" font-size="18" fill="#666" text-anchor="middle">American Fork, UT &#8211; 84003</text>

  <line x1="200" y1="1036" x2="600" y2="1036" stroke="#e8c56a" stroke-width="1" stroke-dasharray="6,4"/>

  <text x="400" y="1058" font-family="Playfair Display, Georgia, serif" font-size="17" fill="#a0693a" text-anchor="middle" font-style="italic">We can&#39;t wait to celebrate with you!</text>

  <!-- Paw prints bottom-left -->
  <ellipse cx="80" cy="1068" rx="16" ry="13" fill="#c4895f" opacity="0.35"/>
  <circle cx="68" cy="1053" r="6" fill="#c4895f" opacity="0.3"/>
  <circle cx="80" cy="1050" r="6" fill="#c4895f" opacity="0.3"/>
  <circle cx="92" cy="1053" r="6" fill="#c4895f" opacity="0.3"/>
  <!-- Paw prints bottom-right -->
  <ellipse cx="720" cy="1068" rx="16" ry="13" fill="#c4895f" opacity="0.35"/>
  <circle cx="708" cy="1053" r="6" fill="#c4895f" opacity="0.3"/>
  <circle cx="720" cy="1050" r="6" fill="#c4895f" opacity="0.3"/>
  <circle cx="732" cy="1053" r="6" fill="#c4895f" opacity="0.3"/>

  <!-- Decorative stars -->
  <text x="56" y="200" font-size="22" fill="#e8c56a" opacity="0.7">&#10022;</text>
  <text x="724" y="200" font-size="22" fill="#e8c56a" opacity="0.7">&#10022;</text>
  <text x="70" y="580" font-size="16" fill="#8faa7c" opacity="0.6">&#10022;</text>
  <text x="714" y="580" font-size="16" fill="#8faa7c" opacity="0.6">&#10022;</text>

  <!-- Small side mini bears -->
  <g transform="translate(72,450) scale(0.32)">
    <circle cx="-40" cy="-50" r="22" fill="#d4956a" opacity="0.7"/>
    <circle cx="-40" cy="-50" r="13" fill="#e8b48a" opacity="0.7"/>
    <circle cx="40" cy="-50" r="22" fill="#d4956a" opacity="0.7"/>
    <circle cx="40" cy="-50" r="13" fill="#e8b48a" opacity="0.7"/>
    <circle cx="0" cy="-10" r="60" fill="#d4956a" opacity="0.7"/>
    <ellipse cx="0" cy="16" rx="26" ry="19" fill="#e8b48a" opacity="0.7"/>
    <circle cx="-20" cy="-28" r="9" fill="#3b1a08" opacity="0.7"/>
    <circle cx="20" cy="-28" r="9" fill="#3b1a08" opacity="0.7"/>
    <ellipse cx="0" cy="6" rx="8" ry="5" fill="#5c3317" opacity="0.7"/>
  </g>
  <g transform="translate(728,450) scale(0.32)">
    <circle cx="-40" cy="-50" r="22" fill="#d4956a" opacity="0.7"/>
    <circle cx="-40" cy="-50" r="13" fill="#e8b48a" opacity="0.7"/>
    <circle cx="40" cy="-50" r="22" fill="#d4956a" opacity="0.7"/>
    <circle cx="40" cy="-50" r="13" fill="#e8b48a" opacity="0.7"/>
    <circle cx="0" cy="-10" r="60" fill="#d4956a" opacity="0.7"/>
    <ellipse cx="0" cy="16" rx="26" ry="19" fill="#e8b48a" opacity="0.7"/>
    <circle cx="-20" cy="-28" r="9" fill="#3b1a08" opacity="0.7"/>
    <circle cx="20" cy="-28" r="9" fill="#3b1a08" opacity="0.7"/>
    <ellipse cx="0" cy="6" rx="8" ry="5" fill="#5c3317" opacity="0.7"/>
  </g>
</svg>
